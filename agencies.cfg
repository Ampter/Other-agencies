// Other Agencies configuration
// If this file is missing or invalid, the mod falls back to built-in defaults.
//
// preference IDs:
// launch_orbit, satellite_comms, mun_minmus, duna_late_game,
// science, part_test, exploration, outer_planets_end_game,
// rescue_transport, urgent

OTHER_AGENCIES
{
    SETTINGS
    {
        // How often the contract watcher evaluates offered contracts.
        checkIntervalSeconds = 5

        // A contract is "near expiry" if remaining time is <= this value.
        nearExpiryThresholdKerbinDays = 0.5

        // A contract is also eligible once it has been offered this long.
        offerAgeThresholdKerbinDays = 3

        // Takeover chance bounds after aggression * relevance.
        minTakeoverChance = 0.08
        maxTakeoverChance = 0.30

        // Unlock times for late-game preference buckets.
        lateGameStartKerbinYears = 3
        endGameStartKerbinYears = 6
    }

    SPACE_RACE_SETTINGS
    {
        // How often active rivals simulate funds/science/stage progress.
        simulationCheckIntervalSeconds = 45

        // How often the mod checks whether the player already won.
        playerProgressCheckIntervalSeconds = 2

        // Limits catch-up work after long timewarp/save-load gaps.
        maxCatchUpTicksPerUpdate = 10

        announceStageChanges = true
        announceResearchUnlocks = true
        announceContractRewards = false
    }

    // Optional keyword overrides for built-in preference IDs.
    PREFERENCE
    {
        id = launch_orbit
        keywords = launch, orbit, sub-orbital, satellite, first launch
