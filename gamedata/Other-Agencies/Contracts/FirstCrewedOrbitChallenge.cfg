CONTRACT_GROUP
{
    name = OtherAgenciesSpaceRace
    displayName = Space Race Challenge
    maxSimultaneous = 1
    agent = Space Race Challenge
}

CONTRACT_TYPE
{
    name = OA_FirstCrewedOrbitChallenge
    title = World First Challenge: Beat KerbalX to Orbit
    genericTitle = Space Race Challenge
    group = OtherAgenciesSpaceRace
    description = KerbalX Industries is openly racing your program to put the first Kerbal into orbit. Accepting starts their linear rival campaign of sounding rockets, sub-orbital work, stolen contracts, and a final orbital push.
    genericDescription = Accept a public world-first style milestone race against a rival space program.
    synopsis = Put a Kerbal into orbit around Kerbin before KerbalX Industries.
    completedMessage = Your program reached crewed orbit before KerbalX Industries.

    minExpiry = 2
    maxExpiry = 2

    cancellable = false
    declinable = true
    maxCompletions = 1
    maxSimultaneous = 1

    rewardScience = 12.0
    rewardReputation = 10.0
    rewardFunds = 18000.0
    failureReputation = 25.0
    failureFunds = 0.0
    advanceFunds = 5000.0

    targetBody = Kerbin

    PARAMETER
    {
        name = FirstCrewedOrbit
        type = VesselParameterGroup
        title = Put a Kerbal into orbit around Kerbin

        PARAMETER
        {
            name = OrbitKerbin
            type = Orbit
            targetBody = Kerbin
            situation = ORBITING
            minAltitude = Kerbin.SpaceAltitudeThreshold()
        }

        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            minCrew = 1
            title = Have at least one Kerbal on board
            hideChildren = true
        }
    }

    REQUIREMENT
    {
        name = FirstLaunch
        type = FirstLaunch
    }

    REQUIREMENT
    {
        name = AnyCompletedContract
        type = CompleteContract
        minCount = 1
        checkOnActiveContract = false
        title = Complete at least one contract first
    }
}
